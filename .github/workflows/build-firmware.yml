name: Build SeedSigner MicroPython Firmware

on:
  workflow_dispatch:
    inputs:
      builder_ref:
        description: "Branch/tag/SHA of seedsigner-micropython-builder to run"
        required: false
        default: "main"
      screens_ref:
        description: "Branch/tag/SHA for seedsigner-lvgl-screens (blank = use pinned submodule commit)"
        required: false
        default: ""
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

# Minimal permissions: the build job only reads the repo (checkout) and uploads
# an artifact via the Actions runtime token, which needs no repo scope. The
# GitHub Pages deploy / PR-comment / preview-cleanup jobs that required broader
# write scopes (pages/id-token/pull-requests, contents:write) have been removed.
permissions:
  contents: read

jobs:
  resolve-image-owner:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Resolve GHCR owner for the base image
        id: owner
        # Standardize on the bot account's public base image regardless of which
        # owner runs CI (upstream kdmukai or the kdmukai-bot fork). This avoids
        # each owner having to publish/maintain its own prebaked base image; the
        # bot builds and publishes it manually (see README-dev.md) and everyone
        # pulls it. The image must be public for cross-account pulls to work.
        # Mirrors GitLab/Forgejo, which already pin the kdmukai-bot registries.
        run: echo "owner_lc=kdmukai-bot" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-image-owner
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      IDF_PATH: /opt/toolchains/esp-idf
      IDF_DIR: /opt/toolchains/esp-idf
      IDF_TOOLS_PATH: /opt/espressif
      # ESP32-P4 is the first-release target; CI builds the P4 board (RISC-V).
      IDF_TOOLS_TARGETS: esp32p4
      BOARD: WAVESHARE_ESP32_P4_WIFI6_TOUCH_LCD_43
      # ccache: the launcher wiring is already in place -- the base image ships
      # ccache and build_firmware.sh passes IDF_CCACHE_ENABLE=1, which routes the
      # IDF CMake compiler launcher through ccache. What was missing is cross-run
      # persistence: point CCACHE_DIR at the workspace (NOT $HOME, which differs
      # between steps in a container job) so actions/cache can save/restore it.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "2G"
    container:
      image: ghcr.io/${{ needs.resolve-image-owner.outputs.owner_lc }}/seedsigner-micropython-builder-base:latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}
          submodules: true

      - name: Init nested submodules not covered by non-recursive checkout
        run: |
          # actions/checkout inits submodules non-recursively, so the nested
          # submodules two levels down are absent -- and the build needs them:
          #   board_common -> esp-camera-pipeline -> k_quirc   (ESP-IDF component)
          #   esp-secp256k1 -> secp256k1-zkp                   (libsecp256k1 amalgamation)
          # All submodule URLs in these subtrees are now public HTTPS GitHub, so they
          # resolve anonymously with no URL rewrite. Scope recursion to these
          # subtrees so MicroPython's own deep submodules are not pulled.
          # The workspace repo is owned by a different uid than this step's user and
          # checkout's safe.directory exception only lives under its temporary HOME,
          # so re-add it here or git aborts with "dubious ownership".
          git config --global --add safe.directory '*'
          git submodule update --init --recursive ports/esp32/board_common deps/seedsigner-lvgl-screens deps/esp-secp256k1

      - name: Prepare sources workspace from prebaked image
        run: |
          mkdir -p deps
          ./scripts/prepare_sources_from_image.sh "$PWD/deps"

      - name: Override lvgl-screens ref (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.screens_ref != ''
        run: |
          git -C deps/seedsigner-lvgl-screens fetch origin
          git -C deps/seedsigner-lvgl-screens checkout ${{ inputs.screens_ref }}

      - name: Ensure baked ESP-IDF tools environment
        run: |
          test -d /opt/toolchains/esp-idf
          mkdir -p "$IDF_TOOLS_PATH"
          # The base image bakes the esp32s3 toolchain; the P4 (RISC-V) needs the
          # esp32p4 toolset. install is idempotent — the riscv32-esp-elf compiler
          # may already be present (the S3 ULP uses it), but make it explicit.
          python3 "$IDF_PATH/tools/idf_tools.py" install --targets=esp32p4
          python3 "$IDF_PATH/tools/idf_tools.py" install riscv32-esp-elf-gdb
          source "$IDF_PATH/export.sh"
          idf.py --version

      - name: Stage frozen app (merge to main only)
        # PRs stay compile-only (no frozen_app/ -> manifest try/except skips the
        # freeze). On push to main, stage the app+embit from the pinned deps/
        # submodules so the build below bakes them in and `make dist` can publish a
        # self-booting image. Version comes from deps/seedsigner git via env.
        if: github.event_name == 'push'
        run: ./scripts/ci/ci.sh stage-frozen

      - name: Restore ccache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ github.workspace }}/.ccache
          # Unique per-run key so the post-job save is NEVER skipped: actions/cache
          # skips saving on an exact primary-key hit, which would freeze the cache
          # at its first contents (0 MB) -- the trap that kept seedsigner-raspi-lvgl
          # cold for weeks. run_attempt keeps re-runs unique too. The prefix
          # restore-key pulls the newest prior cache; PR builds warm from main's.
          key: ccache-firmware-${{ env.BOARD }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-firmware-${{ env.BOARD }}-

      - name: Configure ccache
        # Fail loudly if the base image ever loses the binary: IDF's CMake launcher
        # only warns and compiles cold when ccache is absent. Zero stats so the
        # post-build report reflects only this run.
        run: |
          command -v ccache
          ccache --version
          ccache --zero-stats
          ccache -p | grep -Ei 'cache_dir|max_size' || true

      - name: Build firmware
        run: ./scripts/ci_build.sh "$PWD/deps"

      - name: Report ccache stats
        # Visibility is the whole point -- a "hits" line is the only proof the
        # cache is live. raspi-lvgl printed "ccache enabled" for weeks while 100%
        # cold. Runs on failure too, so a broken build still shows cache state.
        if: always()
        run: ccache --show-stats --verbose || ccache --show-stats || true

      - name: Record build provenance
        run: |
          mkdir -p logs
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "builder_ref=${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}"
            echo "screens_ref_input=${{ github.event_name == 'workflow_dispatch' && inputs.screens_ref || 'pinned-submodule' }}"
            echo "micropython_head=$(git -C deps/micropython/upstream rev-parse HEAD)"
            echo "screens_head=$(git -C deps/seedsigner-lvgl-screens rev-parse HEAD)"
            echo "idf_head=$(git -C "$IDF_PATH" rev-parse HEAD)"
            echo "idf_version=$(source "$IDF_PATH/export.sh" >/dev/null 2>&1; idf.py --version 2>/dev/null || true)"
            echo "python=$(python3 --version 2>&1)"
            echo "cmake=$(cmake --version | head -n1)"
          } | tee logs/provenance.txt

      - name: Package flashable dist (merge to main only)
        # Firmware + baked /main.py launcher image -> dist/<BOARD>/ with a flash_args
        # that includes the vfs partition, so `esptool write_flash @flash_args` yields
        # a board that boots the app on first power-up (no REPL).
        if: github.event_name == 'push'
        run: make dist BOARD="$BOARD"

      - name: Upload flashable dist (merge to main only)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: flashable-dist-waveshare-esp32-p4
          path: dist/${{ env.BOARD }}/
