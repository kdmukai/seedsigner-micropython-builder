name: Build SeedSigner MicroPython Firmware

on:
  workflow_dispatch:
    inputs:
      builder_ref:
        description: "Branch/tag/SHA of seedsigner-micropython-builder to run"
        required: false
        default: "main"
      c_modules_ref:
        description: "Branch/tag/SHA for seedsigner-c-modules (blank = use pinned submodule commit)"
        required: false
        default: ""
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  resolve-image-owner:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Lowercase GHCR owner
        id: owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    needs: resolve-image-owner
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      IDF_PATH: /opt/toolchains/esp-idf
      IDF_DIR: /opt/toolchains/esp-idf
      IDF_TOOLS_PATH: /opt/espressif
      IDF_TOOLS_TARGETS: esp32s3
    container:
      image: ghcr.io/${{ needs.resolve-image-owner.outputs.owner_lc }}/seedsigner-micropython-builder-base:latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}
          submodules: true

      - name: Prepare sources workspace from prebaked image
        run: |
          mkdir -p deps
          ./scripts/prepare_sources_from_image.sh "$PWD/deps"

      - name: Override c-modules ref (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.c_modules_ref != ''
        run: |
          git -C deps/seedsigner-c-modules fetch origin
          git -C deps/seedsigner-c-modules checkout ${{ inputs.c_modules_ref }}

      - name: Ensure baked ESP-IDF tools environment
        run: |
          test -d /opt/toolchains/esp-idf
          mkdir -p "$IDF_TOOLS_PATH"
          python3 "$IDF_PATH/tools/idf_tools.py" install riscv32-esp-elf-gdb
          source "$IDF_PATH/export.sh"
          idf.py --version

      - name: Build firmware + screenshots
        run: |
          ./scripts/ci_build.sh "$PWD/deps"
          ./scripts/run_screenshot_generator.sh "$PWD/deps"

      - name: Record build provenance
        run: |
          mkdir -p logs
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "builder_ref=${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}"
            echo "c_modules_ref_input=${{ github.event_name == 'workflow_dispatch' && inputs.c_modules_ref || 'pinned-submodule' }}"
            echo "micropython_head=$(git -C deps/micropython/upstream rev-parse HEAD)"
            echo "c_modules_head=$(git -C deps/seedsigner-c-modules rev-parse HEAD)"
            echo "idf_head=$(git -C "$IDF_PATH" rev-parse HEAD)"
            echo "idf_version=$(source "$IDF_PATH/export.sh" >/dev/null 2>&1; idf.py --version 2>/dev/null || true)"
            echo "python=$(python3 --version 2>&1)"
            echo "cmake=$(cmake --version | head -n1)"
          } | tee logs/provenance.txt

      - name: Collect firmware artifacts
        run: |
          BOARD=WAVESHARE_ESP32_S3_TOUCH_LCD_35B
          BUILD_DIR="$PWD/build/$BOARD"
          mkdir -p out/bootloader out/partition_table out/logs
          cp "$BUILD_DIR/micropython.bin" out/
          cp "$BUILD_DIR/micropython.elf" out/
          cp "$BUILD_DIR/flash_args" out/
          cp "$BUILD_DIR/bootloader/bootloader.bin" out/bootloader/
          cp "$BUILD_DIR/partition_table/partition-table.bin" out/partition_table/
          cp -r logs/* out/logs/ 2>/dev/null || true
          cp logs/provenance.txt out/logs/ 2>/dev/null || true

      - name: Collect screenshot artifacts
        run: |
          mkdir -p out/screenshots
          cp -r "$PWD/deps/seedsigner-c-modules/tools/screenshot_generator/screenshots" out/screenshots/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-waveshare-esp32-s3
          path: |
            out/
            out/logs/

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-waveshare-esp32-s3
          path: out/screenshots/

  deploy-screenshots:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenshots-waveshare-esp32-s3
          path: screenshots

      - name: Determine deploy path
        id: path
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dest_dir=previews/pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
            echo "msg=Deploy PR #${{ github.event.number }} preview" >> "$GITHUB_OUTPUT"
          else
            echo "dest_dir=." >> "$GITHUB_OUTPUT"
            echo "msg=Deploy stable screenshots" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./screenshots
          destination_dir: ${{ steps.path.outputs.dest_dir }}
          commit_message: ${{ steps.path.outputs.msg }}
          keep_files: true

      - name: Post PR Preview Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEST_DIR: ${{ steps.path.outputs.dest_dir }}
        with:
          script: |
            const destDir = process.env.DEST_DIR;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            
            // Construct Pages URL (assuming standard github.io domain)
            const pagesUrl = `https://${owner}.github.io/${repo}/${destDir}/`;
            
            const marker = '<!-- ss-lvgl-render-tests -->';
            const body = `${marker}\n### SeedSigner LVGL screen tests: [view results gallery](${pagesUrl})`;
            
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            
            const existingComment = comments.find(c => c.body.includes(marker));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }


  cleanup-pr-preview-pages:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        env:
          PR_NUM: ${{ github.event.number }}
        run: |
          TARGET="previews/pr-${PR_NUM}"
          if [ -d "$TARGET" ]; then
            rm -rf "$TARGET"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "pages: remove preview for closed PR #${PR_NUM}"
            git push
          else
            echo "No preview directory for PR #${PR_NUM}; nothing to clean."
          fi
